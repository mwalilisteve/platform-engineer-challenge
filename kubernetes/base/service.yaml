apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
  labels:
    app: api-service
spec:
  # ISSUE 6: Should be ClusterIP — ingress is handled separately
  type: ClusterIP
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
