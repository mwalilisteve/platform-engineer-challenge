apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
  labels:
    app: api-service
spec:
  # FIX (Issue 6): Changed from LoadBalancer to ClusterIP.
  # LoadBalancer provisions a cloud load balancer per service, which is expensive
  # and unnecessary when ingress is handled by a dedicated controller. ClusterIP
  # is the correct type for services that are only accessed via the ingress layer.
  type: ClusterIP
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
