# kubernetes/base/secret.yaml
# FIX (Issue 4): SECRET_KEY is stored here instead of the ConfigMap.
#
# In production, this manifest should NOT contain a real secret value.
# The recommended approach is to use an External Secrets Operator (ESO) or
# Sealed Secrets to inject the value from AWS Secrets Manager / Vault at
# deploy time. The placeholder below is safe to commit; the real value
# would be injected by the CI/CD pipeline or the secret operator controller.
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: default
type: Opaque
stringData:
  # Placeholder — replace via ESO, Sealed Secrets, or CI env injection.
  secret_key: "REPLACE_ME"
