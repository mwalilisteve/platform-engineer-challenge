# ci-cd/pipeline.yml

name: Build and Deploy

# FIX (Bug 1): Scope triggers to push and PRs on main only.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:        ${{ vars.AWS_REGION }}
  ECR_REPOSITORY:    ${{ vars.ECR_REPOSITORY }}
  IMAGE_NAME:        ${{ vars.IMAGE_NAME }}
  KUSTOMIZE_OVERLAY: ${{ vars.KUSTOMIZE_OVERLAY }}

# FIX (Bug 2): Removed hardcoded AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY.
jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag:    ${{ steps.meta.outputs.sha }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # FIX (Bug 2): Authenticate via OIDC — no static keys needed.

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # FIX (Bug 3): Removed hardcoded account ID (123456789012).

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }} \
            .

      # FIX (Bug 4): Image is pushed before tests run
      - name: Run tests
        run: npm test

      # Task 3b: Add Trivy vulnerability scan here
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }}
          format:         table
          exit-code:      "1"
          severity:       ${{ vars.TRIVY_SEVERITY || 'CRITICAL' }}
          ignore-unfixed: true

      - name: Push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }}

  # Task 3c: Add GitOps update step here (push to main only)
  gitops-update:
    needs: build-test-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in overlay
        run: |
          cd ${{ env.KUSTOMIZE_OVERLAY }}
          kustomize edit set image \
            ${{ env.IMAGE_NAME }}=${{ needs.build-test-scan.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-test-scan.outputs.image_tag }}

      - name: Commit and push kustomization change
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.KUSTOMIZE_OVERLAY }}/kustomization.yaml
          git commit -m "chore(gitops): update ${{ env.ECR_REPOSITORY }} to ${{ needs.build-test-scan.outputs.image_tag }} [skip ci]"
          git push